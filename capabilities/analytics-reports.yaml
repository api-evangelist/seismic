naftiko: 1.0.0-alpha2
info:
  label: Seismic Analytics API — Reports
  description: 'Seismic Analytics API — Reports. 3 operations. Lead operation: List Available Reports. Self-contained Naftiko
    capability covering one Seismic business surface.'
  tags:
  - Seismic
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEISMIC_API_KEY: SEISMIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: analytics-reports
    baseUri: https://api.seismic.com/integration/v2
    description: Seismic Analytics API — Reports business capability. Self-contained, no shared references.
    resources:
    - name: analytics-reports
      path: /analytics/reports
      operations:
      - name: listreports
        method: GET
        description: List Available Reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter reports by type.
        - name: offset
          in: query
          type: integer
          description: Number of items to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
    - name: analytics-reports-reportId
      path: /analytics/reports/{reportId}
      operations:
      - name: getreport
        method: GET
        description: Get a Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportId
          in: path
          type: string
          description: Unique identifier of the report.
          required: true
        - name: startDate
          in: query
          type: string
          description: Start date for the report period.
        - name: endDate
          in: query
          type: string
          description: End date for the report period.
        - name: format
          in: query
          type: string
          description: Output format for the report data.
    - name: analytics-reports-reportId-export
      path: /analytics/reports/{reportId}/export
      operations:
      - name: exportreport
        method: POST
        description: Export a Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportId
          in: path
          type: string
          description: Unique identifier of the report.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SEISMIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: analytics-reports-rest
    port: 8080
    description: REST adapter for Seismic Analytics API — Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/reports
      name: analytics-reports
      description: REST surface for analytics-reports.
      operations:
      - method: GET
        name: listreports
        description: List Available Reports
        call: analytics-reports.listreports
        with:
          type: rest.type
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/reports/{reportid}
      name: analytics-reports-reportid
      description: REST surface for analytics-reports-reportId.
      operations:
      - method: GET
        name: getreport
        description: Get a Report
        call: analytics-reports.getreport
        with:
          reportId: rest.reportId
          startDate: rest.startDate
          endDate: rest.endDate
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics/reports/{reportid}/export
      name: analytics-reports-reportid-export
      description: REST surface for analytics-reports-reportId-export.
      operations:
      - method: POST
        name: exportreport
        description: Export a Report
        call: analytics-reports.exportreport
        with:
          reportId: rest.reportId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: analytics-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Seismic Analytics API — Reports. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-available-reports
      description: List Available Reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: analytics-reports.listreports
      with:
        type: tools.type
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-report
      description: Get a Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: analytics-reports.getreport
      with:
        reportId: tools.reportId
        startDate: tools.startDate
        endDate: tools.endDate
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: export-report
      description: Export a Report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: analytics-reports.exportreport
      with:
        reportId: tools.reportId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

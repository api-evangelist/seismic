naftiko: 1.0.0-alpha2
info:
  label: Seismic LiveDocs API — Generation Jobs
  description: 'Seismic LiveDocs API — Generation Jobs. 2 operations. Lead operation: List Generation Jobs. Self-contained
    Naftiko capability covering one Seismic business surface.'
  tags:
  - Seismic
  - Generation Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEISMIC_API_KEY: SEISMIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: livedocs-generation-jobs
    baseUri: https://api.seismic.com/integration/v2
    description: Seismic LiveDocs API — Generation Jobs business capability. Self-contained, no shared references.
    resources:
    - name: livedocs-jobs
      path: /livedocs/jobs
      operations:
      - name: listgenerationjobs
        method: GET
        description: List Generation Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter jobs by status.
        - name: offset
          in: query
          type: integer
          description: Number of items to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
    - name: livedocs-jobs-jobId
      path: /livedocs/jobs/{jobId}
      operations:
      - name: getgenerationjob
        method: GET
        description: Get a Generation Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SEISMIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: livedocs-generation-jobs-rest
    port: 8080
    description: REST adapter for Seismic LiveDocs API — Generation Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/livedocs/jobs
      name: livedocs-jobs
      description: REST surface for livedocs-jobs.
      operations:
      - method: GET
        name: listgenerationjobs
        description: List Generation Jobs
        call: livedocs-generation-jobs.listgenerationjobs
        with:
          status: rest.status
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/livedocs/jobs/{jobid}
      name: livedocs-jobs-jobid
      description: REST surface for livedocs-jobs-jobId.
      operations:
      - method: GET
        name: getgenerationjob
        description: Get a Generation Job
        call: livedocs-generation-jobs.getgenerationjob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: livedocs-generation-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Seismic LiveDocs API — Generation Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-generation-jobs
      description: List Generation Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livedocs-generation-jobs.listgenerationjobs
      with:
        status: tools.status
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-generation-job
      description: Get a Generation Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livedocs-generation-jobs.getgenerationjob
      outputParameters:
      - type: object
        mapping: $.

naftiko: "1.0.0-alpha1"

info:
  label: "Seismic Analytics API"
  description: "API for accessing analytics and reporting data on content usage, user engagement, and sales effectiveness within the Seismic platform."
  tags:
    - Seismic
    - Analytics
    - Reporting
    - Sales Enablement
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SEISMIC_ACCESS_TOKEN: SEISMIC_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: seismic-analytics
      baseUri: https://api.seismic.com/integration/v2
      description: "Seismic Analytics API for content and user engagement reporting."
      authentication:
        type: bearer
        token: "{{SEISMIC_ACCESS_TOKEN}}"
      resources:
        - name: content-analytics
          path: /analytics/content
          description: "Analytics on content usage and engagement."
          operations:
            - name: get-content-analytics
              method: GET
              description: "Retrieve analytics data for content items."
              inputParameters:
                - name: contentId
                  in: query
                  type: string
                  required: false
                  description: "Filter for a specific content item."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date (ISO 8601)."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date (ISO 8601)."
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "Time granularity: daily, weekly, monthly."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: top-content
          path: /analytics/content/top
          description: "Top-performing content analytics."
          operations:
            - name: get-top-content
              method: GET
              description: "Retrieve ranked top-performing content."
              inputParameters:
                - name: metric
                  in: query
                  type: string
                  required: true
                  description: "Metric to rank by: views, downloads, shares, engagement."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of top items to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-analytics
          path: /analytics/users
          description: "Analytics on user activity and adoption."
          operations:
            - name: get-user-analytics
              method: GET
              description: "Retrieve analytics data on user activity."
              inputParameters:
                - name: userId
                  in: query
                  type: string
                  required: false
                  description: "Filter for a specific user."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: delivery-analytics
          path: /analytics/deliveries
          description: "Analytics on content delivery to buyers."
          operations:
            - name: get-delivery-analytics
              method: GET
              description: "Retrieve analytics on content deliveries."
              inputParameters:
                - name: userId
                  in: query
                  type: string
                  required: false
                  description: "Filter by sender user ID."
                - name: contentId
                  in: query
                  type: string
                  required: false
                  description: "Filter by content item."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /analytics/reports
          description: "Analytical reports management."
          operations:
            - name: list-reports
              method: GET
              description: "List available analytical reports."
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by report type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: report
          path: /analytics/reports/{reportId}
          description: "Manage a specific report."
          operations:
            - name: get-report
              method: GET
              description: "Retrieve a specific report with data."
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the report."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date for report period."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date for report period."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: report-export
          path: /analytics/reports/{reportId}/export
          description: "Export a report."
          operations:
            - name: export-report
              method: POST
              description: "Initiate an export of a report."
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the report."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  format: "{{tools.format}}"
                  startDate: "{{tools.startDate}}"
                  endDate: "{{tools.endDate}}"

  exposes:
    - type: rest
      port: 8101
      namespace: seismic-analytics-api
      resources:
        - path: /v1/analytics/content
          name: content-analytics
          description: "Content analytics."
          operations:
            - method: GET
              name: get-content-analytics
              description: "Get content analytics data."
              call: "seismic-analytics.get-content-analytics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/analytics/top-content
          name: top-content
          description: "Top performing content."
          operations:
            - method: GET
              name: get-top-content
              description: "Get top performing content."
              call: "seismic-analytics.get-top-content"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/analytics/users
          name: user-analytics
          description: "User analytics."
          operations:
            - method: GET
              name: get-user-analytics
              description: "Get user analytics data."
              call: "seismic-analytics.get-user-analytics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/analytics/reports
          name: reports
          description: "Analytics reports."
          operations:
            - method: GET
              name: list-reports
              description: "List available reports."
              call: "seismic-analytics.list-reports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: seismic-analytics-mcp
      transport: http
      tools:
        - name: get-content-analytics
          description: "Get analytics data for Seismic content items."
          hints:
            readOnly: true
            openWorld: true
          call: "seismic-analytics.get-content-analytics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-top-content
          description: "Get top-performing content ranked by a metric."
          hints:
            readOnly: true
            openWorld: true
          call: "seismic-analytics.get-top-content"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user-analytics
          description: "Get user activity and adoption analytics."
          hints:
            readOnly: true
            openWorld: true
          call: "seismic-analytics.get-user-analytics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-delivery-analytics
          description: "Get analytics on content deliveries to buyers."
          hints:
            readOnly: true
            openWorld: true
          call: "seismic-analytics.get-delivery-analytics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reports
          description: "List available analytical reports."
          hints:
            readOnly: true
            openWorld: true
          call: "seismic-analytics.list-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-report
          description: "Get a specific analytical report with data."
          hints:
            readOnly: true
            openWorld: false
          call: "seismic-analytics.get-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: export-report
          description: "Export a report to CSV, XLSX, or PDF."
          hints:
            readOnly: false
            openWorld: false
          call: "seismic-analytics.export-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."

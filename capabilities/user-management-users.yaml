    namespace: user-management-users
    baseUri: https://api.seismic.com/integration/v2
    description: Seismic User Management API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Search query to filter users by name or email.
        - name: groupId
          in: query
          type: string
          description: Filter users by group membership.
        - name: roleId
          in: query
          type: string
          description: Filter users by assigned role.
        - name: teamId
          in: query
          type: string
          description: Filter users by team membership.
        - name: status
          in: query
          type: string
          description: Filter users by account status.
        - name: sortBy
          in: query
          type: string
          description: Field to sort results by.
        - name: sortOrder
          in: query
          type: string
          description: Sort order direction.
        - name: offset
          in: query
          type: integer
          description: Number of items to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
      - name: createuser
        method: POST
        description: Create a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: getuser
        method: GET
        description: Get a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateuser
        method: PATCH
        description: Update a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Delete a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reassignTo
          in: query
          type: string
          description: ID of the user to reassign content to.
    - name: users-userId-groups
      path: /users/{userId}/groups
      operations:
      - name: getusergroups
        method: GET
        description: Get User Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setusergroups
        method: PUT
        description: Set User Group Memberships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

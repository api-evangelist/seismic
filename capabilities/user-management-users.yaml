          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SEISMIC_API_KEY}}'
  exposes:
  - type: rest
    namespace: user-management-users-rest
    port: 8080
    description: REST adapter for Seismic User Management API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: List Users
        call: user-management-users.listusers
        with:
          query: rest.query
          groupId: rest.groupId
          roleId: rest.roleId
          teamId: rest.teamId
          status: rest.status
          sortBy: rest.sortBy
          sortOrder: rest.sortOrder
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Create a User
        call: user-management-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: getuser
        description: Get a User
        call: user-management-users.getuser
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateuser
        description: Update a User
        call: user-management-users.updateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Delete a User
        call: user-management-users.deleteuser
        with:
          reassignTo: rest.reassignTo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}/groups
      name: users-userid-groups
      description: REST surface for users-userId-groups.
      operations:
      - method: GET
        name: getusergroups
        description: Get User Groups
        call: user-management-users.getusergroups
        outputParameters:
        - type: object
          mapping: $.

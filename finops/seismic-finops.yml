specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Seismic
providerId: seismic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Sales Enablement
  - Content Management
  - FinOps
  - FOCUS
description: FinOps shape for Seismic — quote-based enterprise SaaS subscription. The provider does not
  publish per-API meters or pricing; cost is a negotiated annual subscription with seats and module add-ons.
  API rate limits are operational guards, not billable meters.
sources:
  - https://seismic.com/
  - https://developer.seismic.com/seismicsoftware/reference/rate-limiting
notes: Pricing and per-meter billing are not publicly disclosed; reconciled to negotiated-subscription
  shape only.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Seismic Software, Inc.
serviceCategory: Sales Enablement SaaS
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Seismic
  ServiceCategory: Sales Enablement SaaS
  ProviderName: Seismic
  PublisherName: Seismic Software, Inc.
  InvoiceIssuerName: Seismic Software, Inc.
  BillingCurrency: USD
meters:
  - name: seat_subscription
    description: Per-seat annual subscription (sales reps, content authors, admins)
    unit: seat
    aggregation: sum
    dimensions:
      - role
  - name: module_addons
    description: Negotiated module / add-on line items (LiveDocs, LiveSend, Reporting, etc.)
    unit: module
    aggregation: sum
    dimensions:
      - module
principles:
  - name: Visibility
    description: Visibility is limited to the Seismic invoice and the Reporting API for in-product activity.
      Use the Reporting API to attribute consumption (content opened, livesends created) back to teams.
  - name: Allocation
    description: Allocate the subscription across sales / marketing / enablement cost centers based on
      seat counts; module add-ons should be allocated to the team that requested them.
  - name: Optimization
    description: Right-size seats annually based on Reporting API activity. Avoid hitting Tier 1 / 1.5
      generation limits with bulk LiveDoc workflows — batch and schedule instead of bursting.
  - name: Accountability
    description: Sales / Revenue Operations typically owns the Seismic line. The integration team owns
      API rate-limit health and exemption requests through Seismic support.
maintainers:

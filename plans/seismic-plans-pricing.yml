description: Seismic is an enterprise sales-enablement platform sold via direct sales. There is no public
  pricing page, no self-serve plan tiers, and no published per-API metering. Subscription terms (seats,
  modules, storage, API entitlements) are negotiated with Seismic sales as part of an annual contract.
sources:
  - https://seismic.com/
  - https://developer.seismic.com/
notes: No public pricing was reconcilable. Seismic operates on quote-based enterprise SaaS sales.
plans:
  - id: seismic-contact-sales
    name: Contact Sales
    type: enterprise
    description: Quote-based enterprise subscription with seat-based licensing and module add-ons (Seismic
      LiveDocs, LiveSend, Workspace, Reporting, etc.). API access is included with the tenant subscription.
    entries:
      - label: Subscription
        name: enterprise_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Seismic Platform
      - name: Seismic API Access
      - name: LiveDocs
      - name: LiveSend
      - name: Reporting API
      - name: Webhooks
